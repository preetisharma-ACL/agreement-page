<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/all.min.css" rel="stylesheet">
    <link href="css/animate.css" rel="stylesheet">

    <title>Thank You</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .bg-wrapper {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url(images/bg-img2.png);
            background-size: cover;
            background-position: center;
            padding: 20px;
        }

        .thankyou-container {
            text-align: center;
            animation: fadeIn 0.6s ease-in-out;
            padding: 40px 30px;
            width: 100%;
        }



        .thankyou-container img {
            margin-bottom: 20px;
        }

        .thankyou-container h1 {
            font-weight: 700;
            font-size: 36px;
            color: #b10303;
            margin-bottom: 15px;
        }


        .thankyou-container p {
            font-size: 16px;
            color: #555;
            line-height: 1.6;
            margin-bottom: 8px;
        }

        .highlight {
            font-weight: 600;
            color: #000;
        }


        @media (max-width: 768px) {
            .thankyou-container {
                padding: 30px 20px;
            }

            .thankyou-container h1 {
                font-size: 28px;
            }

            .thankyou-container img {
                max-width: 120px;
            }
        }


        @media (max-width: 480px) {
            .thankyou-container {
                padding: 25px 15px;
            }

            .thankyou-container img {
                max-width: 100px;
            }

            .thankyou-container h1 {
                font-size: 22px;
            }

            .thankyou-container p {
                font-size: 14px;
            }
        }
        .agree-btn {
            background-color: #b10303;
            color: #fff;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="bg-wrapper">
        <div class="thankyou-container">

            <!-- Image -->
            <img src="images/tq1.png" alt="Success">

            <!-- Content -->
            <h1>Thank You for Your Submission</h1>
            <p class="highlight">Your agreement has been successfully recorded.</p>
            <p>A copy has been sent to your registered email.</p>
            <p>Our team will now proceed with your campaign setup.</p>

            <div>
                <button class="agree-btn" onclick="window.location.href='index.html'">Back to Home</button>
            </div>

        </div>
    </div>
</body>

</html>
